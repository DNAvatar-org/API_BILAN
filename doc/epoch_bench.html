<script>
(function loadEpochBenchModules() {
    'use strict';
    var BASE = '../';
    var LOADER_TIMEOUT_MS = 120000;
    var loaderListEl = document.getElementById('app-loader-list');
    var loaderOverlay = document.getElementById('app-loader');
    var loadLog = [];
    var tPage0 = performance.now();

    var STEPS = [
        // Ex-configsAll.js (bundle retiré v1.2.0) : sources séparées, ordre = dépendances.
        { kind: 'script', src: BASE + 'config/model_tuning_biblio.js', label: 'model_tuning_biblio.js' },
        { kind: 'script', src: BASE + 'config/configTimeline.js', label: 'configTimeline.js' },
        { kind: 'script', src: '../../CO2/static/compute/alphabet.js', label: 'alphabet.js' },
        { kind: 'script', src: '../../CO2/static/compute/dico.js', label: 'dico.js' },
        { kind: 'script', src: BASE + 'data/initDATA.js', label: 'initDATA.js' },
        { kind: 'script', src: BASE + 'config/fine_tuning_bounds.js', label: 'fine_tuning_bounds.js' },
        { kind: 'timeline', src: BASE + 'config/configTimeline.js', label: 'configTimeline.js (fetch)' },
        { kind: 'script', src: BASE + 'physics/physics.js', label: 'physics.js' },
        { kind: 'script', src: BASE + 'data/hitran_lines_CO2.js', label: 'hitran_lines_CO2.js' },
        { kind: 'script', src: BASE + 'data/hitran_lines_H2O.js', label: 'hitran_lines_H2O.js' },
        { kind: 'script', src: BASE + 'data/hitran_lines_CH4.js', label: 'hitran_lines_CH4.js' },
        { kind: 'script', src: BASE + 'spectroscopy/hitran.js', label: 'hitran.js' },
        { kind: 'script', src: BASE + 'physics/climate.js', label: 'climate.js' },
        { kind: 'script', src: BASE + 'radiative/calculations.js', label: 'calculations.js (radiatif)' },
        { kind: 'script', src: BASE + 'workers/worker_pool.js', label: 'worker_pool.js' },
        { kind: 'script', src: BASE + 'h2o/calculations_h2o.js', label: 'calculations_h2o.js' },
        { kind: 'script', src: BASE + 'albedo/calculations_albedo.js', label: 'calculations_albedo.js' },
        { kind: 'script', src: BASE + 'atmosphere/calculations_atm.js', label: 'calculations_atm.js' },
        { kind: 'script', src: BASE + 'co2/calculations_co2.js', label: 'calculations_co2.js' },
        { kind: 'script', src: BASE + 'convergence/compute.js', label: 'compute.js' },
        { kind: 'script', src: BASE + 'convergence/calculations_flux.js', label: 'calculations_flux.js' },
        { kind: 'script', src: BASE + 'tuning.js', label: 'tuning.js' },
        { kind: 'script', src: BASE + 'api.js', label: 'api.js' }
    ];

    function initLoaderUI() {
        if (!loaderListEl) return;
        STEPS.forEach(function (step, i) {
            var li = document.createElement('li');
            li.setAttribute('data-idx', String(i));
            li.textContent = step.label;
            loaderListEl.appendChild(li);
        });
    }

    function setLoaded(index) {
        if (!loaderListEl) return;
        var li = loaderListEl.querySelector('[data-idx="' + index + '"]');
        if (li) li.classList.add('loaded');
    }

    function record(label, ms) {
        loadLog.push({ label: label, ms: ms });
    }

    function loadScript(step, index) {
        return new Promise(function (resolve, reject) {
            var t0 = performance.now();
            var s = document.createElement('script');
            s.src = step.src;
            s.onload = function () {
                record(step.label, performance.now() - t0);
                setLoaded(index);
                resolve();
            };
            s.onerror = function () {
                reject(new Error('\u00c9chec chargement ' + step.src));
            };
            document.body.appendChild(s);
        });
    }

    function loadTimeline(step, index) {
        var t0 = performance.now();
        return fetch(step.src).then(function (r) {
            if (!r.ok) throw new Error('configTimeline HTTP ' + r.status);
            return r.text();
        }).then(function (text) {
            (new Function(text))();
            record(step.label, performance.now() - t0);
            setLoaded(index);
        });
    }

    function runStep(step, index) {
        if (step.kind === 'timeline') return loadTimeline(step, index);
        return loadScript(step, index);
    }

    function loadAllSequential(i) {
        if (i >= STEPS.length) return Promise.resolve();
        return runStep(STEPS[i], i).then(function () {
            return loadAllSequential(i + 1);
        });
    }

    function hideLoader() {
        if (loaderOverlay) loaderOverlay.classList.add('hidden');
    }

    function logLoadSummary() {
        var total = performance.now() - tPage0;
        console.groupCollapsed('[epoch_bench \u00b7 API_BILAN] chargement page', Math.round(total) + ' ms');
        loadLog.forEach(function (e) {
            console.log(e.label, '(' + Math.round(e.ms) + ' ms)');
        });
        var wp = window.__API_BILAN_WORKER_POOL__;
        if (wp) {
            console.log('spectralWorkerPool', wp.nWorkers + ' workers, ' + wp.nCPU + ' CPUs \u2014 Transferable');
        }
        console.groupEnd();
    }

    initLoaderUI();

    var loaderDone = false;
    var timeoutId = setTimeout(function () {
        if (loaderDone) return;
        loaderDone = true;
        hideLoader();
        var f = document.getElementById('footer-info');
        if (f) f.textContent = '\u274c D\u00e9lai chargement d\u00e9pass\u00e9 \u2014 voir la console.';
    }, LOADER_TIMEOUT_MS);

    loadAllSequential(0).then(function () {
        loaderDone = true;
        clearTimeout(timeoutId);
        hideLoader();
        logLoadSummary();
        if (typeof initEpochBenchPage === 'function') initEpochBenchPage();
    }).catch(function (err) {
        loaderDone = true;
        clearTimeout(timeoutId);
        console.error('[epoch_bench]', err);
        hideLoader();
        var f = document.getElementById('footer-info');
        if (f) f.textContent = '\u274c Erreur chargement \u2014 ' + (err && err.message ? err.message : String(err));
    });
})();
</script>

<script>

'use strict';

function initEpochBenchPage() {

/**
 * Bench ne charge pas CO2/organigramme/organigramme.js : CONVERGE / RADIATIVE appellent
 * window.ORG.updateFluxLabels en cycleCalcul. Contrat host complet : assignation explicite,
 * pas de branche typeof sur ORG dans l’API pour cette page isolée.
 */
window.ORG = {
    updateFluxLabels: function () {},
    updateLabel: function () {}
};

window.SYNC_STATE = window.SYNC_STATE || {
    epochId: '\u26ab', animEnabled: false, ticTime: 0, calculationInProgress: false
};
window.ABORT_COMPUTE = false;
if (!window.displayConvergence) window.displayConvergence = function () {};
if (!window.epochName) {
    window.epochName = function (id) {
        return (window.CHARS_DESC && window.CHARS_DESC[id] !== undefined) ? window.CHARS_DESC[id] : id;
    };
}

function fmtC(v) {
    if (v == null || !isFinite(v)) return '<span class="val-na">\u2014</span>';
    return v.toFixed(2);
}
function fmtDelta(v) {
    if (v == null || !isFinite(v)) return '<span class="val-na">\u2014</span>';
    var cls = Math.abs(v) < 0.5 ? 'delta-zero' : (v > 0 ? 'delta-pos' : 'delta-neg');
    var sign = v > 0 ? '+' : '';
    return '<span class="' + cls + '">' + sign + v.toFixed(3) + '</span>';
}
/** Masse air sec moyenne (kg/mol) pour ppm/ppb molaires approx. depuis les masses d’époque. */
var BENCH_M_AIR_KG_PER_MOL = 0.02897;
/** Inventaire océan « PAL » moderne (kg) — repère % hydrosphère config. */
var BENCH_PAL_OCEAN_KG = 1.4e21;

/** Masse colonne atmosphère ~1 bar (kg) — même ordre que P_ratio dans doc physique (≈ 5,148e18). */
var BENCH_M_ATM_REF_KG = 5.148e18;

/**
 * Fourchettes littérature (repère bench) — copie de la grille CSV en commentaire dans
 * API_BILAN/config/configTimeline.js (section « GRILLE LITTÉRATURE » + duplicata détaillé sous l’objet TIMELINE Archéen 🦠).
 * Resynchroniser les trois endroits ensemble si une plage bouge.
 * tC = surface °C ; co2/ch4 = ppm molaires ; h2oVap = % molaire vapeur (atmosphère), pas masse océan.
 */
var BENCH_LIT_BY_EPOCH_ID = {
    '\u26ab': { tC: [-19, -17], co2: [0, 1], ch4: [0, 0.1], h2oVap: [0, 0.01] },
    '\u{1F525}': { tC: [2000, 2500], co2: [100000, 500000], ch4: [10, 100], h2oVap: [10, 20] },

    '\u{1F9A0}': { tC: [10, 60], co2: [50000, 150000], ch4: [1000, 10000], h2oVap: [0.5, 3.0] },
    '\u{1FAB8}': { tC: [5, 20], co2: [5000, 20000], ch4: [50, 500], h2oVap: [0.5, 1.5] },

    '\u{1F9A4}': { tC: [12, 22], co2: [400, 1000], ch4: [1, 5], h2oVap: [0.8, 1.5] },

    '\u{1F4F1}': { tC: [14.5, 15.5], co2: [415, 425], ch4: [1.8, 1.9], h2oVap: [1.0, 1.2] }
};

/** Plage litt\u00e9rature CSV : [min,max] avec virgule (m\u00eame r\u00e8gles d\u2019arrondi qu\u2019avant pour bench). */
function benchLitRangeBracket(lo, hi) {
    function f(x) {
        if (!isFinite(x)) return '?';
        var ax = Math.abs(x);
        if (ax >= 1000) return (x / 1000).toFixed(x % 1000 === 0 ? 0 : 1).replace(/\.0$/, '') + 'k';
        if (ax >= 100) return String(Math.round(x));
        if (ax >= 10) return x.toFixed(1).replace(/\.0$/, '');
        return x.toFixed(2);
    }
    return '[' + f(lo) + ',' + f(hi) + ']';
}

/** T init : ligne 1 = T\u2080 (\u00b0C) ; ligne 2 = fourchette CSV [Tmin,Tmax] ; note \u00e9ventuelle (ligne 3). */
function fmtTinitCell(epoch) {
    var id = epoch['\u{1F4C5}'];
    var tNum = (epoch['\u{1F321}\ufe0f\u{1F9EE}'] - 273.15).toFixed(1);
    var L = BENCH_LIT_BY_EPOCH_ID[id];
    if (!L) return tNum;
    if (!('tC' in L)) {
        return tNum + '<br><span class="bench-sub">' + L.note + '</span>';
    }
    var out = tNum + '<br><span class="bench-sub">' + benchLitRangeBracket(L.tC[0], L.tC[1]) + '</span>';
    if (L.note) {
        out += '<br><span class="bench-sub">' + L.note + '</span>';
    }
    return out;
}

/**
 * Snapshot post-convergence : CO\u2082 / CH\u2084 / H\u2082O ; ligne seule \u{1F370}\u{1FAE7}*\u{1F308}={\u2026} ; alb\u00e9do = CHARS.ALBEDO \u{1FAE9} (miroir, pas confondre avec d\u2019autres glyphes).
 */
function fmtConvAtmSnapshot(snap, epochId) {
    if (!snap) return '<span class="val-na">\u2014</span>';
    var CONST = window.CONST;
    var M_air = snap.Mair;
    var L = (epochId != null && epochId !== '') ? BENCH_LIT_BY_EPOCH_ID[epochId] : null;
    var hasLitGaz = L && ('tC' in L);
    var parts = [];
    if (typeof snap.co2Frac === 'number' && isFinite(snap.co2Frac) && CONST && M_air) {
        var ppmCO2 = snap.co2Frac * (M_air / CONST.M_CO2) * 1e6;
        var sCo2 = '<span class="bench-key">CO\u2082</span>\u2248' + (ppmCO2 < 1e5 ? ppmCO2.toFixed(0) + ' ppm' : (ppmCO2 / 1e3).toFixed(0) + 'k ppm');
        if (hasLitGaz) {
            sCo2 += ' <span class="bench-sub">' + benchLitRangeBracket(L.co2[0], L.co2[1]) + '</span>';
        }
        parts.push(sCo2);
    }
    if (typeof snap.ch4Frac === 'number' && isFinite(snap.ch4Frac) && CONST && M_air) {
        var ppmCH4 = snap.ch4Frac * (M_air / CONST.M_CH4) * 1e6;
        var sCh4 = '<span class="bench-key">CH\u2084</span>\u2248' + (ppmCH4 < 1e5 ? ppmCH4.toFixed(2) + ' ppm' : (ppmCH4 / 1e3).toFixed(0) + 'k ppm');
        if (hasLitGaz) {
            sCh4 += ' <span class="bench-sub">' + benchLitRangeBracket(L.ch4[0], L.ch4[1]) + '</span>';
        }
        parts.push(sCh4);
    }
    if (typeof snap.h2oFrac === 'number' && isFinite(snap.h2oFrac) && CONST && M_air) {
        var molH2O = snap.h2oFrac * (M_air / CONST.M_H2O);
        var sH2o = '<span class="bench-key">H\u2082O</span>\u2248' + (molH2O * 100).toFixed(2) + '% vapmol.';
        if (hasLitGaz) {
            sH2o += ' <span class="bench-sub">' + benchLitRangeBracket(L.h2oVap[0], L.h2oVap[1]) + '</span>';
        }
        parts.push(sH2o);
    }
    function fmtCap(v) {
        if (typeof v !== 'number' || !isFinite(v)) return null;
        if (v === 0) return '0';
        if (v >= 1e-4) return (v * 100).toFixed(2) + '%';
        return v.toExponential(2);
    }
    var capCO2f = fmtCap(snap.capCO2IR);
    var capH2Of = fmtCap(snap.capH2OIR);
    var capSumf = fmtCap(snap.capSumIR);
    var capSegs = [];
    if (capCO2f) capSegs.push('\u{1F3ED}:' + capCO2f);
    if (capH2Of) capSegs.push('\u{1F4A7}:' + capH2Of);
    if (capSumf) capSegs.push('\u{1F4FF}:' + capSumf);
    var lineCake = '';
    if (capSegs.length) {
        lineCake = '<span class="bench-ircap"><span class="bench-key">\u{1F370}\u{1FAE7}*\u{1F308}</span>={' + capSegs.join(', ') + '}</span>';
    }
    var lineAlb = '';
    if (typeof snap.albedo === 'number' && isFinite(snap.albedo)) {
        lineAlb = '<span class="bench-key" title="Alb\u00e9do effectif, cl\u00e9 DATA \u{1F370}\u{1FAE9}\u{1F4FF} (CHARS.ALBEDO)">🪩</span>\u2248' + (snap.albedo * 100).toFixed(1) + '%';
    }
    var chunks = [];
    if (parts.length) {
        chunks.push(parts.join('<br>'));
    } else {
        chunks.push('<span class="val-na">\u2014</span>');
    }
    if (lineCake) chunks.push(lineCake);
    if (lineAlb) chunks.push(lineAlb);
    var out = chunks.join('<br>');
    if (L && !('tC' in L) && L.note) {
        out += '<br><span class="bench-sub">' + L.note + '</span>';
    } else if (hasLitGaz && L.note) {
        out += '<br><span class="bench-sub">' + L.note + '</span>';
    }
    return out;
}

/** RADIATIF : une ligne \u{1F53A}\u{1F9F2} init = \u0394 1er pas ; puis cha\u00eene T (\u00b0C). lastStepForDelta : r\u00e9serv\u00e9 appelant (non affich\u00e9). */
function fmtRadInitAndPath(initStep, radTPath, lastStepForDelta) {
    var lines = [];
    var dInit = (initStep && typeof initStep.delta_equilibre === 'number' && isFinite(initStep.delta_equilibre))
        ? initStep.delta_equilibre : null;
    if (dInit != null) {
        lines.push('<span class="bench-key">\u{1F53A}\u{1F9F2}</span> init: ' + dInit.toFixed(3) + ' W/m\u00b2');
    } else {
        lines.push('<span class="bench-key">\u{1F53A}\u{1F9F2}</span> init: \u2014');
    }
    if (radTPath && radTPath.length) {
        var seg = [];
        for (var i = 0; i < radTPath.length; i++) {
            var t = radTPath[i];
            seg.push((typeof t === 'number' && isFinite(t)) ? t.toFixed(2) : '?');
        }
        lines.push('<span class="bench-tpath">' + seg.join(' \u2192 ') + '</span> \u00b0C');
    } else {
        lines.push('<span class="val-na">\u2014</span>');
    }
    return lines.join('<br>');
}
function copyBenchRow(tr) {
    if (!tr) return;
    var line = tr.dataset.benchCopyLine;
    if (!line) {
        var tds = tr.querySelectorAll('td:not(.cell-icon)');
        var chunks = [];
        for (var i = 0; i < tds.length; i++) {
            chunks.push((tds[i].innerText || '').replace(/\r/g, '').replace(/\n/g, ' ').replace(/\s+/g, ' ').trim());
        }
        line = chunks.join('\t');
    }
    function ok() { }
    function fail(e) {
        console.error('[epoch_bench] copie presse-papiers', e);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(line).then(ok).catch(fail);
    } else {
        var ta = document.createElement('textarea');
        ta.value = line;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try {
            document.execCommand('copy');
            ok();
        } catch (e2) {
            fail(e2);
        }
        document.body.removeChild(ta);
    }
}

/** Fine-tuning : jauge unique ATM (☁️+🔬) comme scie_compute — même % pour CLOUD_SW et SCIENCE. tuning.js : fillDataTuningFromBary. */
function benchFormatTuningValue(value) {
    if (value == null) return 'null';
    if (typeof value === 'number') {
        if (!Number.isFinite(value)) return String(value);
        if (Number.isInteger(value)) return String(value);
        if (Math.abs(value) >= 1000 || (Math.abs(value) > 0 && Math.abs(value) < 0.001)) return value.toExponential(3);
        return parseFloat(value.toFixed(6)).toString();
    }
    if (typeof value === 'string') return value;
    if (typeof value === 'boolean') return value ? 'true' : 'false';
    return String(value);
}
function benchGetFineTuningTargets() {
    return window.FINE_TUNING_BOUNDS.targets.filter(function (target) {
        return target && target.group && target.key && window.DATA['🎚️'][target.group];
    });
}
function benchGetFineTuningTargetsByGroup(groupKey) {
    var targets = benchGetFineTuningTargets();
    if (groupKey === 'SCIENCE') {
        return targets.filter(function (t) { return t.baryGroup === 'SCIENCE'; });
    }
    if (groupKey === 'CLOUD_SW') {
        return targets.filter(function (t) { return t.group === 'CLOUD_SW' && (t.baryGroup == null || t.baryGroup === 'CLOUD_SW'); });
    }
    return targets.filter(function (t) { return t.group === groupKey; });
}
function benchGetFineTuningBaryPercent(groupKey) {
    return Number(window.DATA['🎚️'].baryByGroup[groupKey]);
}
/** Affichage jauge en-tête : si CLOUD_SW ≠ SCIENCE, moyenne arrondie jusqu’à prochain drag unifié. */
function benchGetUnifiedAtmBaryForDisplay() {
    var bg = window.DATA['🎚️'].baryByGroup;
    var c = Number(bg.CLOUD_SW);
    var s = Number(bg.SCIENCE);
    if (!Number.isFinite(c)) c = 50;
    if (!Number.isFinite(s)) s = 50;
    c = Math.round(Math.max(0, Math.min(100, c)));
    s = Math.round(Math.max(0, Math.min(100, s)));
    if (c === s) return c;
    return Math.round(Math.max(0, Math.min(100, (c + s) / 2)));
}
function benchSetFineTuningBaryPercent(groupKey, percentRaw) {
    var p = Number(percentRaw);
    var bounded = Math.max(0, Math.min(100, Number.isFinite(p) ? p : 0));
    window.DATA['🎚️'].baryByGroup[groupKey] = bounded;
    return bounded;
}
function benchGetFineTuningBaryValue(target, baryPercent) {
    var min = Number(target.min);
    var max = Number(target.max);
    var pct = Number(baryPercent);
    var alpha = pct / 100;
    if (alpha < 0) alpha = 0;
    if (alpha > 1) alpha = 1;
    return min + (max - min) * alpha;
}
function benchGetTuningLineLogo(groupKey, key) {
    if (groupKey === 'SOLVER') {
        if (key === 'TOL_MIN_WM2') return '🔬';
        if (key === 'LARGE_DELTA_FACTOR') return '🔺🧲';
        if (key === 'MAX_SEARCH_STEP_K' || key === 'MAX_SEARCH_STEP_LARGE_K') return '🌡️';
        return '🧮';
    }
    if (groupKey === 'SCIENCE') {
        if (key === 'CLOUD_FRACTION_INDEX_GAIN') return '☁️';
        if (key === 'OPTICAL_EFF_CCN_GAIN') return '🧪';
        return '🔬';
    }
    if (groupKey === 'CLOUD_SW') {
        if (key.indexOf('SULFATE') === 0) return '\u2708\uFE0F';
        if (key.indexOf('CLOUD_') === 0) return '☁️';
        if (key.indexOf('OPTICAL_') === 0) return '🧪';
        if (key.indexOf('TEMP_') === 0) return '🌡️';
        return '⛅';
    }
    if (groupKey === 'RADIATIVE') return '🌈';
    return '•';
}
function benchRenderMergedCategory(groupKey, titleLabel, titleIcon, showHeader) {
    var groupTargets = benchGetFineTuningTargetsByGroup(groupKey);
    if (!groupTargets.length) return '';
    var bary = benchGetFineTuningBaryPercent(groupKey);
    if (!Number.isFinite(bary)) bary = 100;
    bary = Math.round(Math.max(0, Math.min(100, bary)));
    var controlsHtml = '';
    if (groupKey === 'SOLVER') {
        controlsHtml = '<span style="display:inline-flex;align-items:center;gap:6px;white-space:nowrap;margin-left:8px;">'
            + '<input id="bench-ft-bary-slider-' + groupKey + '" type="range" min="0" max="100" step="1" value="' + bary
            + '" oninput="window.__BENCH_FT__.onInput(\'' + groupKey + '\', this.value)">'
            + '<span id="bench-ft-bary-value-' + groupKey + '">' + bary + '%</span>'
            + '<button type="button" class="bench-ft-btn" onclick="window.__BENCH_FT__.applyAndRun(\'' + groupKey + '\', document.getElementById(\'bench-ft-bary-slider-' + groupKey + '\').value); return false;">▶️</button>'
            + '</span>';
    }
    var html = '<div class="bench-ft-sec">';
    if (showHeader !== false) {
        html += '<div class="bench-ft-line" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'
            + '<strong style="white-space:nowrap;">' + titleIcon + ' ' + titleLabel + ' 🎚️</strong>' + controlsHtml + '</div>';
    }
    for (var i = 0; i < groupTargets.length; i++) {
        var target = groupTargets[i];
        var logo = benchGetTuningLineLogo(target.group, target.key);
        var activeVal = benchGetFineTuningBaryValue(target, bary);
        html += '<div class="bench-ft-line">' + logo + ' ' + target.key + ' 🔻 ' + benchFormatTuningValue(activeVal)
            + ' [' + benchFormatTuningValue(target.min) + ' , ' + benchFormatTuningValue(target.max) + ']'
            + (target.note ? ' — ' + target.note : '')
            + (target.source ? ' #' + target.source : '') + '</div>';
    }
    html += '</div>';
    return html;
}
/** DATA['🎚️'].baryByGroup ← CONFIG_COMPUTE.baryByGroupDefault (après chargement configTimeline / queue configsAll). */

function fmtAge(years) {
    if (years == null) return '?';
    var Ma = years / 1e6;
    if (Math.abs(Ma) >= 999.5) return (Ma / 1000).toFixed(1) + ' Ga';
    if (Math.abs(Ma) >= 0.999) return Math.round(Ma) + ' Ma';
    var ka = years / 1e3;
    if (Math.abs(ka) >= 0.999) return ka.toFixed(1) + ' ka';
    return Math.round(years) + ' a';
}
function statusHtml(s) {
    if (!s) return '<span class="status-run">\u23f3 calcul\u2026</span>';
    if (s === 'converged') return '<span class="status-ok">\u2705 converged</span>';
    if (s === 'max_iter')  return '<span class="status-warn">\u26a0\ufe0f max_iter</span>';
    if (s === 'crash' || (typeof s === 'string' && s.indexOf('crash:') === 0)) {
        return '<span class="status-err">\u274c ' + String(s) + '</span>';
    }
    if (s === 'abort')     return '<span class="status-err">\u{1F6D1} abort</span>';
    return '<span class="status-warn">\u26a0\ufe0f ' + s + '</span>';
}

function safeIdOf(id) {

    });

function updateRow(id, initStep, lastStep, status, tEpochInitC, epoch, radTPath, convAtmSnap) {
    var safeId = safeIdOf(id);
    var tr = document.getElementById('row-' + safeId);
    if (!tr) return;
    tr.className = status === 'converged' ? 'done-converged'
                 : status === 'max_iter'  ? 'done-maxiter'
                 : (status === 'crash' || status === 'abort' || (typeof status === 'string' && status.indexOf('crash:') === 0)) ? 'done-crash'
                 : 'done-maxiter';

    var tConv = document.getElementById('tconv-' + safeId);
    var dFin  = document.getElementById('dfin-'  + safeId);
    var radPathEl = document.getElementById('radpath-' + safeId);
    var convAtmEl = document.getElementById('convatm-' + safeId);

    if (radPathEl) radPathEl.innerHTML = fmtRadInitAndPath(initStep, radTPath, lastStep);
    if (convAtmEl) convAtmEl.innerHTML = fmtConvAtmSnapshot(convAtmSnap, id);
    /* Pr\u00e9fixe statut dans la cellule T FIN : rien si converged, pictogramme + statut sinon (crash/max_iter/abort).
       Le message complet reste disponible dans les logs (console + log de run). */
    var statusPrefix = '';
    if (status === 'max_iter') statusPrefix = '<span class="status-warn" title="max_iter">\u26a0\ufe0f</span> ';
    else if (status === 'abort') statusPrefix = '<span class="status-err" title="abort">\u{1F6D1}</span> ';
    else if (status === 'crash' || (typeof status === 'string' && status.indexOf('crash:') === 0)) {
        statusPrefix = '<span class="status-err" title="' + String(status) + '">\u274c</span> ';
    } else if (status !== 'converged') {
        statusPrefix = '<span class="status-warn" title="' + String(status) + '">\u26a0\ufe0f</span> ';
    }
    if (tConv && lastStep) tConv.innerHTML = statusPrefix + fmtC(lastStep.temperature_C);
    if (dFin && lastStep && typeof lastStep.temperature_C === 'number' && isFinite(lastStep.temperature_C)
        && typeof tEpochInitC === 'number' && isFinite(tEpochInitC)) {
        dFin.innerHTML = fmtDelta(lastStep.temperature_C - tEpochInitC);
    } else if (dFin) {
        dFin.innerHTML = '<span class="val-na">\u2014</span>';
    }

    var copyParts = [];
    var tdsAll = tr.querySelectorAll('td:not(.cell-icon)');
    for (var ci = 0; ci < tdsAll.length; ci++) {
        copyParts.push((tdsAll[ci].innerText || '').replace(/\r/g, '').replace(/\n/g, ' ').replace(/\s+/g, ' ').trim());
    }
    tr.dataset.benchCopyLine = copyParts.join('\t');
}

async function runAllEpochs() {
    var btn = document.getElementById('btn-run');
    var progressFill = document.getElementById('progress-fill');
    var progressLabel = document.getElementById('progress-label');
    btn.disabled = true;
    document.getElementById('results-body').innerHTML = '';

    var timeline = window.TIMELINE;
    if (!timeline || !timeline.length) {
        progressLabel.textContent = '\u274c TIMELINE non charg\u00e9';
        btn.disabled = false;
        return;
    }

    progressLabel.textContent = '0 / ' + timeline.length + ' epochs';

    var currentStep = null;
    var lastStep = null;
    var initStep = null;
    var finalStatus = null;
    var benchRadPathRef = { path: [] };

    function onEvent(event, payload) {
        if (event === 'convergenceStep') {
            if (payload.phase === 'Init' && payload.innerIter === -1 && !initStep) {
                initStep = payload;
                if (typeof payload.temperature_C === 'number' && isFinite(payload.temperature_C)) {
                    benchRadPathRef.path.push(payload.temperature_C);
                }
                console.log('[bench] Init  \u0394Flux=' + (payload.delta_equilibre != null ? payload.delta_equilibre.toFixed(3) : '?')
                    + '  T=' + (payload.temperature_C != null ? payload.temperature_C.toFixed(2) : '?') + '\u00b0C');
            }
            if ((payload.phase === 'Search' || payload.phase === 'Dicho')
                && typeof payload.temperature_C === 'number') {
                lastStep = payload;
                if (isFinite(payload.temperature_C)) {
                    var prevT = benchRadPathRef.path[benchRadPathRef.path.length - 1];
                    if (prevT === undefined || Math.abs(prevT - payload.temperature_C) > 1e-5) {
                        benchRadPathRef.path.push(payload.temperature_C);
                    }
                }
            }
            if (typeof payload.temperature_C === 'number') currentStep = payload;
        } else if (event === 'ProcessFinished') {
            var snap = payload && payload.DATA && payload.DATA['\u{1F9EE}'];
            finalStatus = (snap && snap['\u{1F9EE}\u{1F6D1}']) || 'finished';
            if (!lastStep && currentStep) lastStep = currentStep;
            console.log('[bench] ProcessFinished  status=' + finalStatus
                + '  T=' + (lastStep && lastStep.temperature_C != null ? lastStep.temperature_C.toFixed(2) : '?') + '\u00b0C');
        }
    }

    var api = window.getBilanRadiatifAPI
        ? window.getBilanRadiatifAPI(onEvent)
        : new BilanRadiatifAPI(onEvent);

    var t0 = Date.now();

    for (var i = 0; i < timeline.length; i++) {
        var epoch = timeline[i];
        var epochId = epoch['\u{1F4C5}'];

        initStep = null; lastStep = null; currentStep = null; finalStatus = null;
        benchRadPathRef.path = [];
        window.ABORT_COMPUTE = false;

        createRow(epoch);

        progressLabel.textContent = (i + 1) + ' / ' + timeline.length + ' \u2014 ' + window.epochName(epochId);
        progressFill.style.width = ((i / timeline.length) * 100) + '%';

        console.log('[bench] \u2014\u2014 \u00c9poque ' + (i+1) + '/' + timeline.length + ' : ' + epochId + ' \u2014\u2014');

        if (window.DATA) {
            window.DATA['\u{1F4DC}'] = window.DATA['\u{1F4DC}'] || {};
            window.DATA['\u{1F4DC}']['\u{1F53A}\u{1F321}\ufe0f\u{1F4AB}'] = 0;
            window.DATA['\u{1F4DC}']['\u{1F4FF}\u{1F4AB}']   = 0;
        }

        var tEp = Date.now();
        console.log('[bench] api.run d\u00e9marrage', String(epochId));
        try {
            await api.run({ epochId: epochId, animEnabled: false });
        } catch (e) {
            finalStatus = 'crash: ' + e.message;
            console.error('[bench] ' + epochId, e);
        }

        if (!finalStatus) {
            var snapStatus = window.DATA && window.DATA['\u{1F9EE}'] && window.DATA['\u{1F9EE}']['\u{1F9EE}\u{1F6D1}'];
            finalStatus = snapStatus || 'finished';
        }
        console.log('[bench] api.run termin\u00e9', String(epochId), String(finalStatus),
            (Date.now() - tEp) + ' ms');
        if (!lastStep && currentStep) lastStep = currentStep;

        var tEpochInitC = (epoch['\u{1F321}\ufe0f\u{1F9EE}'] - 273.15);
        var radPathCopy = benchRadPathRef.path.slice();
        if (lastStep && typeof lastStep.temperature_C === 'number' && isFinite(lastStep.temperature_C)) {
            var lastP = radPathCopy[radPathCopy.length - 1];
            if (lastP === undefined || Math.abs(lastP - lastStep.temperature_C) > 1e-5) {
                radPathCopy.push(lastStep.temperature_C);
            }
        }
        window.__RAD_CAP_LAST_DBG__ = null;
        if (window.RADIATIVE && window.RADIATIVE.calculateRadiativeCapacities) {
            try { window.RADIATIVE.calculateRadiativeCapacities(); }
            catch (e) { console.error('[bench][' + epochId + '] calculateRadiativeCapacities threw', e); }
        } else {
            console.error('[bench][' + epochId + '] window.RADIATIVE.calculateRadiativeCapacities is NOT defined');
        }
        var __dbg = window.__RAD_CAP_LAST_DBG__;
        console.log('[bench][' + epochId + '] RAD_CAP dbg =', __dbg);
        if (__dbg && __dbg.firstBad) {
            try {
                console.log('[bench][' + epochId + '] RAD_CAP firstBad = ' + JSON.stringify(__dbg.firstBad));
            } catch (e) {
                console.log('[bench][' + epochId + '] RAD_CAP firstBad (obj) =', __dbg.firstBad);
            }
        } else if (__dbg) {
            console.log('[bench][' + epochId + '] RAD_CAP firstBad = null (aucune \u03b4\u03c4 non-finie ou n\u00e9gative d\u00e9tect\u00e9e)');
        }
        var D = window.DATA || {};
        var D_ATM = D['🫧'] || {};
        var D_H2O = D['💧'] || {};
        var D_ALB = D['🪩'] || {};
        var convAtmSnap = {
            co2Frac:  D_ATM['🍰🫧🏭'],
            ch4Frac:  D_ATM['🍰🫧🐄'],
            h2oFrac:  D_H2O['🍰🫧💧'],
            albedo:   D_ALB['🍰🪩📿'],
            Mair:     D_ATM['🧪'],
            capCO2IR: D_ATM['🍰🫧🏭🌈'],
            capH2OIR: D_ATM['🍰🫧💧🌈'],
            capSumIR: D_ATM['🍰🫧📿🌈']
        };
        var D_STAT = D['📊'] || {};
        var lrLen = (D_STAT.lambda_range) ? D_STAT.lambda_range.length : 0;
        var zrLen = (D_STAT.z_range) ? D_STAT.z_range.length : 0;
        console.log('[bench][' + epochId + '] CONV ATM raw'
            + ' CO2Frac(mass)=' + convAtmSnap.co2Frac
            + ' CH4Frac(mass)=' + convAtmSnap.ch4Frac
            + ' H2OFrac(mass)=' + convAtmSnap.h2oFrac
            + ' albedo=' + convAtmSnap.albedo
            + ' Mair=' + convAtmSnap.Mair
            + ' \u{1F308}CO2=' + convAtmSnap.capCO2IR
            + ' \u{1F308}H2O=' + convAtmSnap.capH2OIR
            + ' \u{1F308}\u03a3=' + convAtmSnap.capSumIR
            + ' lambda_range.len=' + lrLen
            + ' z_range.len=' + zrLen);
        updateRow(epochId, initStep, lastStep, finalStatus, tEpochInitC, epoch, radPathCopy, convAtmSnap);
    }

    var elapsed = ((Date.now() - t0) / 1000).toFixed(1);
    progressFill.style.width = '100%';
    progressLabel.textContent = '\u2705 ' + timeline.length + ' \u00e9poques \u2014 ' + elapsed + ' s';
    btn.disabled = false;
    btn.textContent = '\u21ba Relancer';
    document.getElementById('footer-info').textContent =
        'Rapport g\u00e9n\u00e9r\u00e9 le ' + new Date().toLocaleString('fr-FR')
        + ' \u2014 ' + timeline.length + ' \u00e9poques en ' + elapsed + 's';
}

window.__BENCH_FT__ = {
    onInput: function (groupKey, v) {
        benchOnFineTuningBaryInput(groupKey, v);
    },
    applyAndRun: function (groupKey, v) {
        if (groupKey === 'ATM') {
            benchApplyFineTuningAtmUnified(v, true);
        } else {
            benchApplyFineTuningBaryGroup(groupKey, v, true);
        }
        runAllEpochs();
    },
    togglePanel: function () {
        var content = document.getElementById('bench-ft-content');
        var btn = document.getElementById('bench-ft-panel-toggle');
        if (!content) return;
        var hidden = content.style.display === 'none' || !content.style.display;
        content.style.display = hidden ? 'block' : 'none';
        if (btn) btn.textContent = hidden ? '\u2212' : '+';
    },
    refresh: benchDisplayFineTuning
};

document.addEventListener('mousedown', function (e) {
    var el = e.target;
    if (!el || el.type !== 'range' || !el.id) return;
    var id = el.id;
    if (id.indexOf('bench-ft-bary-slider') !== 0 && id !== 'bench-ft-slider-ATM-header') return;
    var r = el.getBoundingClientRect();
    var min = parseFloat(el.min) || 0;
    var max = parseFloat(el.max) || 100;
    var val = parseFloat(el.value) || min;
    var pct = (max > min) ? (val - min) / (max - min) : 0;
    var thumbX = r.left + pct * r.width;
    if (Math.abs(e.clientX - thumbX) > 15) e.preventDefault();
}, true);

var ok = window.DATA && window.TIMELINE && window.CONST && window.CONV;
var footer = document.getElementById('footer-info');
if (ok) {
    benchSyncBaryFromConfigCompute();
    if (window.TUNING && window.TUNING.fillDataTuningFromBary) window.TUNING.fillDataTuningFromBary();
    benchDisplayFineTuning();
    var dbgHint = window.UI_STATE.debugAPI
        ? ' \u2014 debugAPI : groupes [API_BILAN] calcul'
        : ' \u2014 ?debugAPI=true pour logs calcul group\u00e9s';
    footer.textContent = 'Pr\u00eat \u2014 ' + window.TIMELINE.length + ' \u00e9poques charg\u00e9es' + dbgHint;
    document.getElementById('btn-run').disabled = false;
} else {
    footer.textContent = '\u274c Ressources manquantes (DATA=' + !!window.DATA
        + ', TIMELINE=' + !!window.TIMELINE + ', CONST=' + !!window.CONST
        + ', CONV=' + !!window.CONV + ')';
}
document.getElementById('btn-run').addEventListener('click', function () {
    // Reset du fichier topic courant AVANT le run : garantit "que le dernier test" (p.ex. iceFactor.txt).
    if (window.DEBUG && window.DEBUG.topic) { window.DEBUG.reset(); }
    runAllEpochs();
});

document.getElementById('results-body').addEventListener('click', function (ev) {
    var t = ev.target;
    if (!t || !t.closest) return;
    var btn = t.closest('.btn-copy-row');
    if (!btn) return;
    var sid = btn.getAttribute('data-copy-row');
    var tr = sid ? document.getElementById('row-' + sid) : null;
    if (tr) copyBenchRow(tr);
});

}

</script>
